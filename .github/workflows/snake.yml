name: Generate Snake Animation

on:
  # Run every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main/master
  push:
    branches:
      - main
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate snake SVG
        uses: PlatYphd/github-snake-dark@main
        with:
          github_user_name: mekyrus
          output: github-contribution-grid-snake-dark.svg
          color_snake: white
          color_dots: "#cccccc"
      
      - name: Create output branch if not exists
        run: |
          git fetch origin output || true
          if ! git rev-parse --verify output >/dev/null 2>&1; then
            git checkout --orphan output
            git rm -rf .
            git commit --allow-empty -m "Initial commit on output branch"
            git push -u origin output
            git checkout -
          fi
      
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: output
          keep_files: true
          destination_dir: ./
